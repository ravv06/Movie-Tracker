<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Shelf Tracker</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(255, 255, 255, 0.2);
      --panel-strong: rgba(255, 255, 255, 0.34);
      --line: rgba(255, 255, 255, 0.42);
      --ink: #fffaf1;
      --muted: rgba(255, 250, 241, 0.72);
      --gold: #f5b950;
      --ember: #d96d37;
      --coal: #17110d;
      --green: #7ad090;
      --radius: 26px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 22%, rgba(102, 169, 190, 0.8) 0 9rem, transparent 19rem),
        radial-gradient(circle at 88% 12%, rgba(233, 193, 130, 0.75) 0 12rem, transparent 24rem),
        radial-gradient(circle at 44% 80%, rgba(45, 74, 65, 0.76) 0 14rem, transparent 27rem),
        linear-gradient(135deg, #86735f 0%, #342923 44%, #c9b59d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.1), transparent 28%, rgba(0,0,0,0.22)),
        url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=70");
      background-size: cover;
      background-position: center;
      filter: blur(18px) saturate(1.1);
      transform: scale(1.08);
      opacity: 0.58;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: 100vw;
      height: 100vh;
      min-height: 670px;
      padding: 28px 36px 22px;
      border: none;
      border-radius: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.28), rgba(255,255,255,0.08) 36%, rgba(0,0,0,0.12)),
        rgba(111, 92, 76, 0.38);
      box-shadow: 0 28px 80px rgba(20, 13, 8, 0.36), inset 0 0 36px rgba(255,255,255,0.22);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 24px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: 255px 1fr auto;
      align-items: center;
      gap: 22px;
    }

    .search {
      height: 39px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 10px 22px rgba(0,0,0,0.12);
    }

    .search svg {
      width: 17px;
      height: 17px;
      color: rgba(255,255,255,0.86);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: white;
      background: transparent;
      font-size: 13px;
      font-weight: 800;
    }

    .search input::placeholder {
      color: rgba(255,255,255,0.72);
    }

    .tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 0;
    }

    .tab {
      min-width: 96px;
      height: 39px;
      padding: 0 18px;
      border-radius: 999px;
      color: white;
      background: transparent;
      font-size: 14px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    .tab.active {
      background: rgba(255,255,255,0.35);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.32), 0 11px 20px rgba(0,0,0,0.13);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-button {
      position: relative;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #17110d;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 12px 20px rgba(0,0,0,0.22), inset 0 1px 2px rgba(255,255,255,0.8);
    }

    .icon-button svg {
      width: 21px;
      height: 21px;
      stroke-width: 3;
    }

    .dot {
      position: absolute;
      top: 2px;
      right: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d6ef34;
      border: 2px solid white;
    }

    .user-pill {
      min-width: 165px;
      height: 42px;
      padding: 4px 9px 4px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 999px;
      color: white;
      background: rgba(255,255,255,0.42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 14px 23px rgba(0,0,0,0.18);
      font-size: 12px;
      font-weight: 900;
    }

    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      grid-template-rows: 1fr auto;
      gap: 22px 24px;
      grid-template-areas:
        "side hero"
        "side picks";
    }

    .side {
      grid-area: side;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
    }

    .side-section {
      min-height: 0;
      padding: 0;
    }

    .section-head {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-weight: 900;
      font-size: 15px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.22);
    }

    .select-like {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,0.86);
      font-size: 13px;
      font-weight: 800;
    }

    .vertical-list {
      height: calc(100% - 32px);
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 9px;
    }

    .trailer {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      background: #2e241d;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12), 0 12px 26px rgba(0,0,0,0.22);
      isolation: isolate;
    }

    .trailer img,
    .track-thumb img,
    .pick-card img,
    .hero-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .trailer::after,
    .pick-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(to top, rgba(8,5,4,0.88), rgba(8,5,4,0.05) 62%);
      pointer-events: none;
    }

    .trailer-title {
      position: absolute;
      left: 12px;
      right: 46px;
      bottom: 10px;
      z-index: 2;
      margin: 0;
      font-size: 12px;
      line-height: 1.1;
      font-weight: 900;
    }

    .release-source {
      position: absolute;
      left: 10px;
      top: 9px;
      z-index: 2;
      max-width: calc(100% - 20px);
      padding: 3px 8px;
      overflow: hidden;
      border-radius: 999px;
      color: #23150e;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 6px 12px rgba(0,0,0,0.18);
      font-size: 9px;
      font-weight: 1000;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .play-mini {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 3;
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: rgba(255,255,255,0.27);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
    }

    .play-mini svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      stroke-width: 3;
    }

    .continue-panel {
      height: calc(100% - 32px);
      display: grid;
      gap: 11px;
      padding: 13px 13px 13px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 13px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .track-row {
      min-height: 0;
      display: grid;
      grid-template-columns: 58px 1fr 28px;
      align-items: center;
      gap: 12px;
    }

    .track-thumb {
      height: 48px;
      border-radius: 10px;
      overflow: hidden;
      background: #241a14;
      box-shadow: 0 8px 14px rgba(0,0,0,0.2);
    }

    .track-copy {
      min-width: 0;
    }

    .track-copy b {
      display: block;
      overflow: hidden;
      color: white;
      font-size: 12px;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-copy span {
      color: rgba(255,255,255,0.69);
      font-size: 10px;
      font-weight: 800;
    }

    .hero {
      grid-area: hero;
      position: relative;
      min-height: 0;
      border-radius: 19px;
      overflow: hidden;
      background: #110906;
      box-shadow: 0 22px 48px rgba(18, 9, 4, 0.32), inset 0 0 0 1px rgba(255,255,255,0.15);
      isolation: isolate;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      filter: saturate(1.1);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(14,8,5,0.92) 0%, rgba(14,8,5,0.68) 36%, rgba(14,8,5,0.08) 72%),
        linear-gradient(to top, rgba(14,8,5,0.54), transparent 50%);
      pointer-events: none;
    }

    .hero-info {
      position: relative;
      z-index: 2;
      width: min(480px, 58%);
      height: 100%;
      padding: 48px 0 34px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 21px;
      padding: 0 10px;
      border-radius: 999px;
      color: #f9c36a;
      background: rgba(65, 42, 17, 0.78);
      box-shadow: inset 0 0 0 1px rgba(245,185,80,0.28);
      font-size: 10px;
      font-weight: 900;
    }

    .chips {
      display: flex;
      gap: 8px;
      margin: 42px 0 5px;
    }

    .chip {
      padding: 4px 11px;
      border-radius: 999px;
      color: #f7d9a3;
      background: rgba(255,255,255,0.12);
      font-size: 10px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 5.2vw, 78px);
      line-height: 0.92;
      letter-spacing: 0;
      text-shadow: 0 4px 18px rgba(0,0,0,0.42);
    }

    .hero-info p {
      width: min(410px, 100%);
      margin: 14px 0 24px;
      color: rgba(255,250,241,0.76);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 700;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .action {
      height: 39px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      color: #19110d;
      background: white;
      font-size: 13px;
      font-weight: 1000;
      box-shadow: 0 11px 20px rgba(0,0,0,0.26), inset 0 -1px 0 rgba(0,0,0,0.1);
    }

    .action.secondary {
      color: white;
      background: rgba(255,255,255,0.32);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35), 0 11px 20px rgba(0,0,0,0.17);
    }

    .round-action {
      width: 43px;
      height: 43px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: rgba(0,0,0,0.24);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.76);
      backdrop-filter: blur(8px);
    }

    .action svg,
    .round-action svg {
      width: 17px;
      height: 17px;
      stroke-width: 3;
    }

    .hero-nav {
      position: absolute;
      right: 36px;
      bottom: 26px;
      z-index: 3;
      display: flex;
      gap: 14px;
    }

    .arrow {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: rgba(214, 153, 62, 0.85);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .arrow svg {
      width: 16px;
      height: 16px;
      stroke-width: 4;
    }

    .picks {
      grid-area: picks;
      min-height: 0;
    }

    .picks .section-head {
      height: 34px;
      padding: 0 1px;
    }

    .see-all {
      height: 24px;
      padding: 0 14px;
      border-radius: 999px;
      color: white;
      background: rgba(255,255,255,0.26);
      font-size: 11px;
      font-weight: 900;
    }

    .card-grid {
      height: 205px;
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 20px;
    }

    .pick-card {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: #221812;
      box-shadow: 0 16px 28px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.12);
      isolation: isolate;
    }

    .pick-copy {
      position: absolute;
      left: 15px;
      right: 39px;
      bottom: 17px;
      z-index: 2;
    }

    .pick-copy b {
      display: block;
      font-size: 16px;
      line-height: 1.05;
      font-weight: 1000;
    }

    .pick-copy span {
      display: block;
      margin-top: 5px;
      color: rgba(255,255,255,0.68);
      font-size: 10px;
      line-height: 1.22;
      font-weight: 700;
    }

    .pager {
      position: absolute;
      left: 50%;
      bottom: 11px;
      z-index: 4;
      display: flex;
      gap: 7px;
      transform: translateX(-50%);
    }

    .pager i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
    }

    .pager i.active {
      width: 16px;
      border-radius: 999px;
      background: var(--gold);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(10,7,5,0.54);
      backdrop-filter: blur(10px);
    }

    .modal.open {
      display: grid;
    }

    .modal-card {
      width: min(520px, 100%);
      padding: 22px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.42);
      background: rgba(43, 31, 23, 0.88);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .modal-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .modal h2 {
      margin: 0;
      font-size: 26px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .status-grid button {
      min-height: 42px;
      border-radius: 12px;
      color: white;
      background: rgba(255,255,255,0.18);
      font-size: 12px;
      font-weight: 900;
    }

    .status-grid button.active {
      color: #20150f;
      background: var(--gold);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 40;
      min-width: min(380px, calc(100vw - 40px));
      padding: 13px 18px;
      border-radius: 999px;
      color: #21150f;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 18px 35px rgba(0,0,0,0.22);
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      opacity: 0;
      transform: translate(-50%, 16px);
      transition: 0.25s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .hidden {
      display: none !important;
    }

    .add-btn {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #19110d;
      background: var(--gold);
      box-shadow: 0 6px 14px rgba(0,0,0,0.22);
      flex: 0 0 auto;
    }
    .add-btn svg { width: 14px; height: 14px; stroke-width: 3; }

    #addModal select option { background: #2e1f15; color: white; }
    #addModal input:focus, #addModal textarea:focus { border-color: var(--gold) !important; }
    #fetchDetailsBtn:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 980px) {
      body {
        display: block;
        overflow-y: auto;
      }

      .app {
        width: 100vw;
        height: auto;
        min-height: 0;
        margin: 0;
        padding: 24px 18px 22px;
        border-radius: 0;
        overflow: visible;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      .tabs {
        grid-column: 1 / -1;
        justify-content: flex-start;
        order: 3;
        overflow-x: auto;
        padding-bottom: 3px;
      }

      .tab {
        min-width: max-content;
      }

      .content {
        grid-template-columns: 1fr;
        grid-template-areas:
          "hero"
          "picks"
          "side";
      }

      .hero {
        min-height: 380px;
      }

      .hero-info {
        width: 84%;
        padding-left: 26px;
      }

      .side {
        grid-template-rows: auto auto;
      }

      .vertical-list {
        height: auto;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 120px;
      }

      .continue-panel {
        height: auto;
      }

      .card-grid {
        height: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .pick-card {
        min-height: 210px;
      }
    }

    @media (max-width: 610px) {
      .app {
        width: 100vw;
        margin: 0;
        padding: 17px 12px 18px;
        border-radius: 0;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .profile {
        justify-content: space-between;
      }

      .user-pill {
        flex: 1;
      }

      .hero {
        min-height: 430px;
      }

      .hero-info {
        width: 100%;
        padding: 120px 20px 28px;
        justify-content: flex-end;
      }

      .hero::after {
        background:
          linear-gradient(to top, rgba(14,8,5,0.96) 0%, rgba(14,8,5,0.58) 48%, rgba(14,8,5,0.05) 100%);
      }

      .chips {
        margin-top: 0;
      }

      .actions {
        flex-wrap: wrap;
      }

      .vertical-list,
      .card-grid,
      .status-grid {
        grid-template-columns: 1fr;
      }

      .vertical-list {
        grid-template-rows: repeat(3, 125px);
      }

      .hero-nav {
        right: 22px;
        top: 22px;
        bottom: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Movie, series and book tracker">
    <header class="topbar">

      <div class="profile">

        <button class="user-pill" id="profileButton" aria-label="Open profile stats">
          <span class="avatar" id="profileAvatar" aria-hidden="true"></span>
          <span id="profileName">Your List</span>
          <i data-lucide="chevron-down" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <section class="content">
      <aside class="side">
        <section class="side-section">
          <div class="section-head">

          </div>
          <div class="vertical-list" id="trailerList"></div>
        </section>

        <section class="side-section">
          <div class="section-head">
            <span>Continue watching</span>
          </div>
          <div class="continue-panel" id="continueList"></div>
        </section>
      </aside>

      <section class="hero" aria-live="polite">
        <img class="hero-bg" id="heroImage" alt="" />
        <div class="hero-info">
          <span class="badge" id="heroStatus">Now Tracking</span>
          <div class="chips" id="heroChips"></div>

          <p id="heroDescription"></p>
          <div class="actions">

            <button class="action secondary" id="saveButton"><i data-lucide="download"></i><span>Download</span></button>
            <button class="round-action" id="detailsButton" aria-label="Open details" title="Details"><i data-lucide="ellipsis"></i></button>

        </div>

        </div>
      </section>

      <section class="picks">
        <div class="section-head">
          <span>Watch List</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="see-all" id="seeAllButton">See all</button>
            <button class="add-btn" id="addItemButton" title="Add to Watch List" aria-label="Add new item to Watch List"><i data-lucide="plus"></i></button>
          </div>
        </div>
        <div class="card-grid" id="pickGrid"></div>
      </section>
    </section>

    <div class="pager" id="pager" aria-hidden="true"></div>
  </main>

  <section class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div>

      <p id="modalNotes" style="font-size:11px;color:var(--gold);font-weight:800;margin-top:-8px;margin-bottom:8px;min-height:0;display:none;"></p>
      <div class="status-grid" id="statusGrid">
        <button data-status="New Release">New Release</button>
        <button data-status="Want to Start">Want to Start</button>

      <button id="deleteItemBtn" style="margin-top:14px;width:100%;height:38px;border-radius:12px;background:rgba(220,60,60,0.22);color:#f88;font-weight:900;font-size:12px;border:1px solid rgba(220,60,60,0.35);">

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

      <!-- Manual fields (shown after fetch or as fallback) -->
      <div id="manualFields" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
          <div>
            <label style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.65);display:block;margin-bottom:5px;">TYPE</label>
            <select id="addType" style="width:100%;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);color:white;padding:0 10px;font-size:13px;font-weight:800;outline:none;">

            <label style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.65);display:block;margin-bottom:5px;">STATUS</label>
            <select id="addStatus" style="width:100%;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);color:white;padding:0 10px;font-size:13px;font-weight:800;outline:none;">
              <option value="Want to Start">Want to Start</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.65);display:block;margin-bottom:5px;">NOTES (optional)</label>

    // LocalStorage persistence

        localStorage.setItem(STORAGE_KEY, JSON.stringify(personalItems));
      } catch(e) {}
    }
    function loadItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length) {
            items.length = 0;
            parsed
              .filter(i => !LEGACY_STARTER_IDS.includes(i.id) && i.status !== "New Release" && !String(i.id || "").startsWith("release-"))
              .forEach(i => items.push(i));
          }

    const LEGACY_STARTER_IDS = ["oppenheimer", "john-wick", "barbie", "last-of-us", "despicable-me", "kingdom-apes", "justice-league", "dune-book"];

    loadItems();

      try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch(e) {}

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");

    function runReleaseScout() {
      const today = new Date();
      today.setHours(12, 0, 0, 0);
      const majorSources = ["Cinema", "Netflix", "Prime Video", "Disney+ Hotstar", "JioCinema", "Apple TV+", "SonyLIV", "ZEE5"];

      detectedReleases = releaseFeed
        .map((release) => {
          const releaseDate = new Date(`${release.releaseDate}T12:00:00`);
          const daysAway = Math.round((releaseDate - today) / 86400000);
          const sourceBoost = majorSources.includes(release.provider) ? 18 : 6;
          const freshness = Math.max(0, 42 - Math.abs(daysAway) * 4);
          const confidence = Math.min(99, release.popularity * 0.48 + sourceBoost + freshness);
          return { ...release, daysAway, confidence: Math.round(confidence) };
        })
        .filter((release) => release.daysAway >= -7 && release.daysAway <= 14 && release.confidence >= 68)
        .sort((a, b) => b.confidence - a.confidence)
        .slice(0, 3);

      detectedReleases.forEach((release) => {
        const id = `release-${slugify(release.title)}`;
        if (items.some((item) => item.id === id)) return;

        const dayLabel = release.daysAway === 0
          ? "releases today"
          : release.daysAway < 0
            ? `released ${Math.abs(release.daysAway)}d ago`
            : `releases in ${release.daysAway}d`;

        items.push({
          id,
          title: release.title,
          type: release.type,
          category: release.type,
          tags: [release.provider, ...release.genres.slice(0, 1)],
          status: "New Release",
          progress: dayLabel,
          image: release.image,
          thumb: release.thumb,
          provider: release.provider,
          confidence: release.confidence,
          releaseDate: release.releaseDate,
          description: `AI release scout detected this from ${release.provider}. It ${dayLabel} and matched your tracker because it is fresh, popular, and from a major OTT or cinema source.`
        });
      });
    }

    async function hydrateImdbReleaseCalendar() {
      const calendarUrls = [
        "https://www.imdb.com/calendar/?region=US&type=MOVIE",
        "https://www.imdb.com/calendar/?region=IN&type=MOVIE"
      ];
      const titles = new Set();

      for (const url of calendarUrls) {
        try {
          const response = await fetch(url, { headers: { "Accept": "text/html" } });
          if (!response.ok) continue;
          const html = await response.text();
          const doc = new DOMParser().parseFromString(html, "text/html");
          doc.querySelectorAll('a[href^="/title/tt"]').forEach((link) => {
            const title = link.textContent.trim();
            if (title && title.length > 1 && titles.size < 12) titles.add(title);
          });
        } catch (error) {
          console.warn("IMDb calendar lookup blocked by browser security; using generated release scout fallback.", error);
        }
      }

      if (!titles.size) return;

      const liveItems = [];
      for (const title of [...titles].slice(0, 6)) {
        try {
          const item = await searchImdbSuggestions(title);
          if (item && !items.some((existing) => existing.id === item.id || existing.imdbId === item.imdbId || existing.title.toLowerCase() === item.title.toLowerCase())) {
            item.id = `release-${slugify(item.imdbId || item.title)}`;
            item.status = "New Release";
            item.progress = "From IMDb calendar";
            item.provider = "IMDb Calendar";
            item.confidence = Math.max(item.confidence || 88, 92);
            item.description = `${item.description} Automatically generated from IMDb release calendar and ranked by your release scout.`;
            liveItems.push(item);
          }
        } catch (error) {
          console.warn("IMDb title enrichment failed", title, error);
        }
      }

      if (liveItems.length) {
        items.push(...liveItems);
        detectedReleases = liveItems;
      }
    }

    function textMatchScore(source, query) {
      const clean = (value) => (value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
      const title = clean(source);
      const wanted = clean(query);
      if (!title || !wanted) return 0;
      if (title === wanted) return 100;
      if (title.startsWith(wanted) || wanted.startsWith(title)) return 86;
      const wantedWords = wanted.split(" ").filter(Boolean);
      const shared = wantedWords.filter((word) => title.includes(word)).length;
      return Math.round((shared / Math.max(wantedWords.length, 1)) * 72);
    }

    async function fetchJson(url, timeout = 9000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function cleanHtml(value) {
      const node = document.createElement("div");
      node.innerHTML = value || "";
      return node.textContent.trim();
    }

    function itemTypeFromImdb(result) {
      const typeText = `${result.q || ""} ${result.qid || ""}`.toLowerCase();
      if (typeText.includes("tv") || typeText.includes("series")) return "series";
      if (typeText.includes("short") || typeText.includes("video")) return "movie";
      return "movie";
    }

    function withDefaults(item, query, confidence) {
      const poster = item.thumb || item.image || "";
      const type = item.type || "movie";
      return {
        id: "custom-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6),
        title: item.title || query,
        type,
        category: item.category || type,
        tags: (item.tags || []).filter(Boolean).slice(0, 3),
        description: item.description || `Added from metadata search for "${query}". Review the details before saving.`,
        provider: item.provider || "IMDb",
        status: "Want to Start",
        progress: "Not started",
        image: item.image || poster,
        thumb: item.thumb || poster,
        imdbId: item.imdbId || "",
        year: item.year || "",
        confidence
      };
    }

    async function searchImdbSuggestions(query) {
      const first = (query.trim()[0] || "a").toLowerCase().replace(/[^a-z0-9]/g, "a");
      const url = `https://v3.sg.media-imdb.com/suggestion/${first}/${encodeURIComponent(query.trim())}.json`;
      const data = await fetchJson(url);
      const candidates = (data.d || [])
        .filter((entry) => entry.l && entry.id && !String(entry.qid || "").includes("videoGame"))
        .map((entry) => {
          const score = textMatchScore(entry.l, query) + (entry.i?.imageUrl ? 12 : 0) + (entry.y ? 4 : 0);
          const type = itemTypeFromImdb(entry);
          return withDefaults({
            title: entry.l,
            type,
            category: type,
            tags: [entry.q || (type === "series" ? "TV Series" : "Movie"), entry.y ? String(entry.y) : ""],
            provider: "IMDb",
            description: [entry.l, entry.y, entry.s].filter(Boolean).join(" - "),
            image: entry.i?.imageUrl || "",
            thumb: entry.i?.imageUrl || "",
            imdbId: entry.id,
            year: entry.y || ""
          }, query, Math.min(98, score));
        })
        .sort((a, b) => b.confidence - a.confidence);

      return candidates[0] && candidates[0].confidence >= 60 ? candidates[0] : null;
    }

    async function searchTvMaze(query) {
      const data = await fetchJson(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`);
      const hit = (data || [])
        .map((entry) => ({ entry, score: textMatchScore(entry.show?.name, query) + (entry.show?.image?.original ? 10 : 0) }))
        .sort((a, b) => b.score - a.score)[0];

      if (!hit || hit.score < 58) return null;
      const show = hit.entry.show;
      return withDefaults({
        title: show.name,
        type: "series",
        category: "series",
        tags: (show.genres && show.genres.length ? show.genres : ["TV Series"]).slice(0, 3),
        provider: show.network?.name || show.webChannel?.name || "TVMaze",
        description: cleanHtml(show.summary) || `${show.name} series details found from TVMaze.`,
        image: show.image?.original || show.image?.medium || "",
        thumb: show.image?.medium || show.image?.original || "",
        year: show.premiered ? show.premiered.slice(0, 4) : ""
      }, query, Math.min(96, hit.score));
    }

    async function searchOpenLibrary(query) {
      const data = await fetchJson(`https://openlibrary.org/search.json?title=${encodeURIComponent(query)}&limit=5`);
      const hit = (data.docs || [])
        .map((book) => ({ book, score: textMatchScore(book.title, query) + (book.cover_i ? 12 : 0) }))
        .sort((a, b) => b.score - a.score)[0];

      if (!hit || hit.score < 58) return null;
      const book = hit.book;
      const cover = book.cover_i ? `https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg` : "";
      return withDefaults({
        title: book.title,
        type: "book",
        category: "book",
        tags: ["Book", ...(book.subject || []).slice(0, 2)],
        provider: "Open Library",
        description: `${book.title}${book.author_name?.[0] ? ` by ${book.author_name[0]}` : ""}${book.first_publish_year ? `, first published in ${book.first_publish_year}` : ""}.`,
        image: cover,
        thumb: cover,
        year: book.first_publish_year || ""
      }, query, Math.min(94, hit.score));
    }

    async function searchWikipediaFallback(query) {
      const url = "https://en.wikipedia.org/w/api.php?action=query&origin=*&generator=search&gsrnamespace=0&gsrlimit=3&prop=pageimages|extracts&exintro=1&explaintext=1&pithumbsize=800&format=json&gsrsearch=" + encodeURIComponent(`${query} film television book`);
      const data = await fetchJson(url);
      const pages = Object.values(data.query?.pages || {});
      const hit = pages
        .map((page) => ({ page, score: textMatchScore(page.title, query) + (page.thumbnail?.source ? 8 : 0) }))
        .sort((a, b) => b.score - a.score)[0];

      if (!hit || hit.score < 48) return null;
      const titleText = `${hit.page.title} ${hit.page.extract || ""}`.toLowerCase();
      const type = titleText.includes("novel") || titleText.includes("book") ? "book" : titleText.includes("series") || titleText.includes("television") ? "series" : "movie";
      return withDefaults({
        title: hit.page.title.replace(/\s*\([^)]*\)\s*/g, "").trim(),
        type,
        category: type,
        tags: [type === "book" ? "Book" : type === "series" ? "TV Series" : "Movie"],
        provider: "Wikipedia",
        description: (hit.page.extract || "").slice(0, 220),
        image: hit.page.thumbnail?.source || "",
        thumb: hit.page.thumbnail?.source || ""
      }, query, Math.min(82, hit.score));
    }

    async function fetchItemDetails(query) {
      const status = $("#fetchStatus");
      const sources = [
        ["IMDb", searchImdbSuggestions],
        ["TVMaze", searchTvMaze],
        ["Open Library", searchOpenLibrary],
        ["Wikipedia", searchWikipediaFallback]
      ];
      const found = [];

      status.textContent = "Searching IMDb, OTT, TV and book databases...";

      for (const [name, search] of sources) {
        try {
          status.textContent = `Checking ${name}...`;
          const item = await search(query);
          if (item) found.push(item);
        } catch (error) {
          console.warn(`${name} lookup failed`, error);
        }
      }

      const best = found.sort((a, b) => b.confidence - a.confidence)[0];
      if (best) {
        status.textContent = `Found from ${best.provider}${best.imdbId ? " using IMDb id " + best.imdbId : ""}. Review details below.`;
        return best;
      }

      status.textContent = "Couldn't auto-fetch from public databases. Fill details manually.";
      return null;
    }

    function showPreview(item) {
      if (!item) return;
      const preview = $("#addPreview");
      preview.style.display = "block";
      const thumb = item.thumb || item.image || "";
      $("#previewThumb").src = thumb;
      $("#previewThumb").style.display = thumb ? "block" : "none";
      $("#previewBadge").textContent = item.type || "Unknown";
      $("#previewTitle").textContent = item.title || "";
      $("#previewTags").innerHTML = (item.tags || []).map(t => `<span class="chip">${t}</span>`).join("");
      $("#previewDesc").textContent = item.description || "";
      $("#previewPlatform").textContent = item.provider ? `ðŸ“º ${item.provider}` : "";
      $("#manualFields").style.display = "block";
      if (item.type) $("#addType").value = item.type;
      $("#addStatus").value = "Want to Start";
      refreshIcons();
    }

    $("#fetchDetailsBtn").addEventListener("click", async () => {
      const query = $("#addTitleInput").value.trim();
      if (!query) { showToast("Type a title first!"); return; }
      $("#fetchDetailsBtn").disabled = true;
      pendingItem = await fetchItemDetails(query);
      if (pendingItem) {
        showPreview(pendingItem);
      } else {
        // Show manual form with just the typed title
        pendingItem = {
          id: "custom-" + Date.now(),
          title: query,
          type: "movie",
          category: "movie",
          tags: [],
          status: "Want to Start",
          progress: "Not started",
          description: "",
          image: "",
          thumb: "",
          provider: ""
        };
        $("#addPreview").style.display = "none";
        $("#manualFields").style.display = "block";
      }
      $("#fetchDetailsBtn").disabled = false;
      refreshIcons();
    });

    $("#addTitleInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") $("#fetchDetailsBtn").click();
    });

    $("#confirmAddBtn").addEventListener("click", () => {
      if (!pendingItem) return;
      pendingItem.type = $("#addType").value;
      pendingItem.category = pendingItem.type;
      pendingItem.status = $("#addStatus").value;
      const notes = $("#addNotes").value.trim();
      if (notes) pendingItem.progress = notes;
      else if (!pendingItem.progress) pendingItem.progress = "Not started";
      // If image failed or empty, set a gradient placeholder
      if (!pendingItem.image) {
        pendingItem.image = "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1400&q=70";
        pendingItem.thumb = "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=500&q=70";
      }
      items.unshift(pendingItem);
      saveItems();
      addModal.classList.remove("open");
      heroIndex = 0;
      renderAll();
      showToast(`"${pendingItem.title}" added to your tracker!`);
      pendingItem = null;
      $("#addNotes").value = "";
    });

    initializeProfile();
    runReleaseScout();
    renderAll();
    hydrateImdbReleaseCalendar()
      .then(renderAll)
      .catch(() => renderAll());
  </script>
</body>
</html>
